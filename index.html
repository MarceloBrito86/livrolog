<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LivroLog">
<meta name="theme-color" content="#0d0d0f">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>LivroLog</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0d0f;--bg2:#17171a;--bg3:#222226;--border:#2e2e33;
  --text:#f0f0f2;--muted:#888890;--accent:#5fb3d9;--accent2:#4a93b3;
  --red:#e24b4a;--green:#3bba7a;--blue:#4a9ded;--purple:#9b72cf;
  --radius:14px;--safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;height:100dvh}

.header{background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px 8px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding-top:max(12px,env(safe-area-inset-top))}
.header-title{font-size:22px;font-weight:700;letter-spacing:-.5px;color:var(--accent)}
.header-sub{font-size:12px;color:var(--muted);margin-top:1px}
.header-btns{display:flex;gap:6px;align-items:center}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.icon-btn.accent{background:var(--accent);border-color:var(--accent);color:#000;font-size:20px;font-weight:300}

.bottom-nav{display:flex;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:var(--safe-bottom)}
.nav-btn{flex:1;padding:10px 4px 8px;border:none;background:transparent;color:var(--muted);font-size:10px;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-btn .nav-icon{font-size:20px}
.nav-btn.active{color:var(--accent)}

.page{display:none;flex:1;overflow:hidden;flex-direction:column}
.page.active{display:flex}

.tabs{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;cursor:pointer;white-space:nowrap;font-family:inherit}
.tab.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}

.filter-row{display:flex;gap:6px;padding:0 16px 8px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;align-items:center}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0}
.filter-chip.active{border-color:var(--text);color:var(--text);background:var(--bg3)}

.search-wrap{padding:0 16px 8px;flex-shrink:0}
.search-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:9px 14px;color:var(--text);font-size:14px;font-family:inherit;outline:none}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{border-color:var(--accent)}

.sort-row{display:flex;gap:6px;padding:0 16px 8px;flex-shrink:0;align-items:center}
.sort-label{font-size:12px;color:var(--muted)}
.sort-select{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;padding:4px 8px;font-family:inherit;outline:none;cursor:pointer}

.list{flex:1;overflow-y:auto;padding:0 16px;padding-bottom:calc(16px + var(--safe-bottom))}
.list::-webkit-scrollbar{display:none}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:10px;cursor:pointer;position:relative;overflow:hidden}
.card:active{background:var(--bg3)}
.card-header{display:flex;gap:12px;align-items:flex-start}
.card-poster{width:50px;height:74px;border-radius:6px;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;font-size:24px}
.card-poster img{width:100%;height:100%;object-fit:cover}
.card-info{flex:1;min-width:0}
.card-title{font-size:15px;font-weight:600;line-height:1.3;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-author{font-size:12px;color:var(--muted);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:12px;color:var(--muted);margin-bottom:6px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.badge-fisico{background:#1a2a1a;color:var(--green)}
.badge-digital{background:#1a1a2a;color:var(--blue)}
.badge-genre{background:var(--bg3);color:var(--muted)}
.card-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.card-score{display:flex;align-items:baseline;gap:3px}
.score-big{font-size:22px;font-weight:700;color:var(--accent);line-height:1}
.score-small{font-size:11px;color:var(--muted)}
.card-like{font-size:20px}
.card-date{font-size:11px;color:var(--muted)}
.stars{display:flex;gap:1px;margin-top:3px}

.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty h3{font-size:18px;font-weight:600;color:var(--text);margin-bottom:8px}
.empty p{font-size:14px;line-height:1.6}

.stats-bar{display:flex;gap:8px;padding:0 16px 8px;flex-shrink:0}
.stat-card{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 6px;text-align:center}
.stat-num{font-size:17px;font-weight:700;color:var(--accent)}
.stat-label{font-size:10px;color:var(--muted);margin-top:1px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:flex;align-items:flex-end;opacity:0;transition:opacity .3s;pointer-events:none}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border-radius:22px 22px 0 0;padding:20px 20px calc(20px + var(--safe-bottom));width:100%;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,0,.67,0)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;cursor:grab}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-label{font-size:12px;color:var(--muted);margin-bottom:6px;display:block;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:15px;font-family:inherit;outline:none;-webkit-appearance:none}
.form-input:focus{border-color:var(--accent)}
.form-select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:15px;font-family:inherit;outline:none;-webkit-appearance:none;cursor:pointer}
.form-select:focus{border-color:var(--accent)}
.form-row{display:flex;gap:10px}
.form-row .form-group{flex:1}
.type-toggle{display:flex;gap:8px}
.type-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-size:14px;cursor:pointer;font-family:inherit}
.type-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(95,179,217,.1)}
.rating-wrap{display:flex;align-items:center;gap:10px}
.rating-input{flex:1;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--border);outline:none;cursor:pointer}
.rating-input::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--accent);cursor:pointer}
.rating-val{font-size:22px;font-weight:700;color:var(--accent);min-width:28px;text-align:right}
.like-btns{display:flex;gap:8px}
.like-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-size:14px;cursor:pointer;font-family:inherit;text-align:center}
.like-btn.active-yes{border-color:var(--green);color:var(--green);background:rgba(59,186,122,.1)}
.like-btn.active-no{border-color:var(--red);color:var(--red);background:rgba(226,75,74,.1)}
.save-btn{width:100%;padding:14px;border-radius:12px;background:var(--accent);color:#000;font-size:16px;font-weight:700;border:none;cursor:pointer;font-family:inherit;margin-top:8px}
.save-btn:active{background:var(--accent2)}
.delete-btn{width:100%;padding:12px;border-radius:12px;background:transparent;color:var(--red);font-size:15px;font-weight:500;border:1px solid var(--border);cursor:pointer;font-family:inherit;margin-top:8px}

.poster-search-wrap{position:relative}
.poster-search-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--accent);border:none;border-radius:6px;color:#000;font-size:12px;font-weight:600;padding:4px 8px;cursor:pointer;font-family:inherit}
.poster-preview{width:80px;height:118px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:32px;overflow:hidden;margin-bottom:8px;border:2px solid var(--border)}
.poster-preview img{width:100%;height:100%;object-fit:cover}
.poster-options{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.poster-options::-webkit-scrollbar{display:none}
.poster-opt{width:50px;height:74px;border-radius:6px;overflow:hidden;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.poster-opt.selected{border-color:var(--accent)}
.poster-opt img{width:100%;height:100%;object-fit:cover}

.detail-poster{width:100px;height:148px;border-radius:8px;background:var(--bg3);margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:44px;overflow:hidden}
.detail-poster img{width:100%;height:100%;object-fit:cover}
.detail-title{font-size:20px;font-weight:700;margin-bottom:2px;text-align:center}
.detail-author{font-size:14px;color:var(--muted);text-align:center;margin-bottom:8px}
.detail-badges{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.detail-score{font-size:52px;font-weight:700;color:var(--accent);text-align:center;line-height:1}
.detail-score-label{font-size:12px;color:var(--muted);text-align:center;margin-bottom:8px}
.detail-stars{display:flex;justify-content:center;gap:3px;margin-bottom:16px}
.detail-opinion{font-size:22px;text-align:center;margin-bottom:20px;font-weight:600}
.detail-notes{background:var(--bg3);border-radius:10px;padding:12px;font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:16px}
.detail-actions{display:flex;gap:8px}
.edit-btn{flex:1;padding:12px;border-radius:12px;background:var(--bg3);color:var(--text);font-size:15px;font-weight:500;border:1px solid var(--border);cursor:pointer;font-family:inherit}

.sync-banner{background:rgba(95,179,217,.1);border:1px solid rgba(95,179,217,.3);border-radius:10px;padding:8px 12px;margin:0 16px 8px;font-size:12px;color:var(--accent);display:none;align-items:center;gap:8px;flex-shrink:0}
.sync-banner.show{display:flex}

.backup-section{background:var(--bg3);border-radius:12px;padding:14px;margin-bottom:14px}
.backup-title{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.backup-btn{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:14px;cursor:pointer;font-family:inherit;margin-bottom:8px;display:flex;align-items:center;gap:10px;text-align:left}
.backup-btn:last-child{margin-bottom:0}
.backup-btn .btn-icon{font-size:20px;width:28px;text-align:center}
.backup-btn .btn-info{flex:1}
.backup-btn .btn-label{font-weight:600;font-size:14px}
.backup-btn .btn-desc{font-size:12px;color:var(--muted);margin-top:2px}
.danger-zone{border-color:rgba(226,75,74,.3)}
.danger-zone .btn-label{color:var(--red)}

.ranking-list{flex:1;overflow-y:auto;padding:0 16px;padding-bottom:calc(16px + var(--safe-bottom))}
.ranking-list::-webkit-scrollbar{display:none}
.rank-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer}
.rank-card:active{background:var(--bg3)}
.rank-num{font-size:22px;font-weight:800;color:var(--muted);min-width:32px;text-align:center}
.rank-num.gold{color:#ffd700}
.rank-num.silver{color:#c0c0c0}
.rank-num.bronze{color:#cd7f32}
.rank-poster{width:38px;height:56px;border-radius:5px;background:var(--bg3);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.rank-poster img{width:100%;height:100%;object-fit:cover}
.rank-info{flex:1;min-width:0}
.rank-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-sub{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-score{font-size:24px;font-weight:700;color:var(--accent)}

.stats-page{flex:1;overflow-y:auto;padding:16px;padding-bottom:calc(16px + var(--safe-bottom))}
.stats-page::-webkit-scrollbar{display:none}
.stats-section{margin-bottom:20px}
.stats-section-title{font-size:14px;font-weight:600;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.big-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.big-stat{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.big-stat-num{font-size:32px;font-weight:800;color:var(--accent)}
.big-stat-label{font-size:12px;color:var(--muted);margin-top:4px}
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-label{font-size:12px;color:var(--muted);min-width:90px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:20px;background:var(--bg3);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .6s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:6px}
.bar-fill-val{font-size:11px;font-weight:600;color:#000}
.donut-wrap{display:flex;align-items:center;justify-content:center;gap:20px;padding:10px 0}
.donut-legend{display:flex;flex-direction:column;gap:8px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:13px}
.legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.score-dist{display:flex;align-items:flex-end;gap:4px;height:80px;padding:0 4px}
.score-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.score-bar{width:100%;background:var(--accent);border-radius:3px 3px 0 0;min-height:2px;transition:height .6s ease}
.score-bar-label{font-size:9px;color:var(--muted)}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <div class="header-title">📚 LivroLog</div>
      <div class="header-sub" id="header-sub">Carregando...</div>
    </div>
    <div class="header-btns">
      <button class="icon-btn" onclick="openMenuModal()" aria-label="Menu">☰</button>
      <button class="icon-btn accent" onclick="openAddModal()" aria-label="Adicionar">+</button>
    </div>
  </div>

  <div class="page active" id="page-home">
    <div class="tabs" id="tabs">
      <button class="tab active" onclick="setType('todos')">Todos</button>
      <button class="tab" onclick="setType('fisico')">📖 Físico</button>
      <button class="tab" onclick="setType('digital')">📱 Digital</button>
    </div>
    <div class="stats-bar" id="stats-bar"></div>
    <div class="sync-banner" id="sync-banner"><span>💾</span><span id="sync-text">Salvando...</span></div>
    <div class="filter-row" id="filters"></div>
    <div class="search-wrap">
      <input class="search-input" type="text" placeholder="🔍  Buscar título ou autor..." id="search-input" oninput="render()">
    </div>
    <div class="sort-row">
      <span class="sort-label">Ordenar:</span>
      <select class="sort-select" id="sort-select" onchange="render()">
        <option value="recente">Mais recente</option>
        <option value="nota-desc">Maior nota</option>
        <option value="nota-asc">Menor nota</option>
        <option value="titulo">Título A-Z</option>
        <option value="autor">Autor A-Z</option>
        <option value="ano-desc">Ano (novo)</option>
        <option value="ano-asc">Ano (antigo)</option>
      </select>
      <select class="sort-select" id="year-select" onchange="render()" style="margin-left:auto">
        <option value="">Todos os anos</option>
      </select>
    </div>
    <div class="list" id="list"></div>
  </div>

  <div class="page" id="page-ranking">
    <div style="padding:14px 16px 8px;flex-shrink:0">
      <div style="font-size:18px;font-weight:700;margin-bottom:4px">🏆 Ranking</div>
      <div style="font-size:13px;color:var(--muted)">Os mais bem avaliados</div>
    </div>
    <div class="tabs" id="rank-tabs" style="padding-top:4px">
      <button class="tab active" onclick="setRankType('todos')">Todos</button>
      <button class="tab" onclick="setRankType('fisico')">📖 Físico</button>
      <button class="tab" onclick="setRankType('digital')">📱 Digital</button>
    </div>
    <div class="ranking-list" id="ranking-list"></div>
  </div>

  <div class="page" id="page-stats">
    <div style="padding:14px 16px 0;flex-shrink:0">
      <div style="font-size:18px;font-weight:700;margin-bottom:4px">📊 Estatísticas</div>
      <div style="font-size:13px;color:var(--muted)">Resumo da sua biblioteca</div>
    </div>
    <div class="stats-page" id="stats-page"></div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="showPage('home')"><span class="nav-icon">📚</span><span>Início</span></button>
    <button class="nav-btn" id="nav-ranking" onclick="showPage('ranking')"><span class="nav-icon">🏆</span><span>Ranking</span></button>
    <button class="nav-btn" id="nav-stats" onclick="showPage('stats')"><span class="nav-icon">📊</span><span>Stats</span></button>
  </div>
</div>

<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Novo livro</div>
    <div class="form-group">
      <label class="form-label">Formato</label>
      <div class="type-toggle">
        <button class="type-btn active" id="btn-fisico" onclick="selectType('fisico')">📖 Físico</button>
        <button class="type-btn" id="btn-digital" onclick="selectType('digital')">📱 Digital</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Título</label>
      <div class="poster-search-wrap">
        <input class="form-input" type="text" id="f-title" placeholder="Nome do livro" autocomplete="off" style="padding-right:90px" oninput="onTitleInput()">
        <button class="poster-search-btn" onclick="searchPoster()">🔍 Buscar capa</button>
      </div>
    </div>
    <div class="form-group" id="poster-group">
      <label class="form-label">Capa</label>
      <div class="poster-preview" id="poster-preview"><span id="poster-emoji">📖</span></div>
      <div class="poster-options" id="poster-options"></div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px" id="poster-status"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Autor</label>
      <input class="form-input" type="text" id="f-author" placeholder="Nome do autor" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">Gênero</label>
      <select class="form-select" id="f-genre">
        <option value="Ficção">📘 Ficção</option>
        <option value="Não-ficção">📗 Não-ficção</option>
        <option value="Romance">💕 Romance</option>
        <option value="Fantasia">🧙 Fantasia</option>
        <option value="Ficção Científica">🚀 Ficção Científica</option>
        <option value="Suspense">🔍 Suspense</option>
        <option value="Terror">👻 Terror</option>
        <option value="Biografia">👤 Biografia</option>
        <option value="Autoajuda">💡 Autoajuda</option>
        <option value="Negócios">💼 Negócios</option>
        <option value="História">🏛️ História</option>
        <option value="Poesia">🪶 Poesia</option>
        <option value="Quadrinhos/HQ">💬 Quadrinhos/HQ</option>
        <option value="Infantil">🧸 Infantil</option>
        <option value="Acadêmico">🎓 Acadêmico</option>

<div id="toast" style="position:fixed;bottom:calc(80px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;max-width:90vw;text-align:center"></div>

<script>
const GENRES_EMOJI={'Ficção':'📘','Não-ficção':'📗',Romance:'💕',Fantasia:'🧙','Ficção Científica':'🚀',Suspense:'🔍',Terror:'👻',Biografia:'👤',Autoajuda:'💡',Negócios:'💼',História:'🏛️',Poesia:'🪶','Quadrinhos/HQ':'💬',Infantil:'🧸',Acadêmico:'🎓',Outro:'📓'};

let items=[];
let currentType='todos';
let currentGenre='Todos';
let rankType='todos';
let editingId=null;
let formType='fisico';
let formLike='neutro';
let selectedPosterUrl='';

function load(){
  try{const r=localStorage.getItem('livrolog_v1');items=r?JSON.parse(r):[];}catch(e){items=[];}
  render();renderRanking();renderStats();updateSubtitle();updateYearSelect();
}
function save(){
  try{localStorage.setItem('livrolog_v1',JSON.stringify(items));showSync();}
  catch(e){alert('Erro ao salvar!');}
}
function showSync(){
  const b=document.getElementById('sync-banner');
  b.classList.add('show');clearTimeout(b._t);
  b._t=setTimeout(()=>b.classList.remove('show'),2500);
}
function updateSubtitle(){
  const f=items.filter(i=>i.type==='fisico').length;
  const d=items.filter(i=>i.type==='digital').length;
  document.getElementById('header-sub').textContent=`${f} físico${f!==1?'s':''} · ${d} digital${d!==1?'is':''}`;
}
function updateYearSelect(){
  const years=[...new Set(items.map(i=>i.year).filter(Boolean))].sort((a,b)=>b-a);
  const sel=document.getElementById('year-select');const cur=sel.value;
  sel.innerHTML='<option value="">Todos os anos</option>'+years.map(y=>`<option value="${y}">${y}</option>`).join('');
  if(cur)sel.value=cur;
}
function getFiltered(){
  let list=[...items];
  if(currentType!=='todos')list=list.filter(i=>i.type===currentType);
  if(currentGenre!=='Todos')list=list.filter(i=>i.genre===currentGenre);
  const yr=document.getElementById('year-select')?.value;
  if(yr)list=list.filter(i=>String(i.year)===String(yr));
  const q=document.getElementById('search-input')?.value.toLowerCase().trim();
  if(q)list=list.filter(i=>i.title.toLowerCase().includes(q)||(i.author||'').toLowerCase().includes(q));
  const sort=document.getElementById('sort-select')?.value||'recente';
  if(sort==='nota-desc')list.sort((a,b)=>b.rating-a.rating);
  else if(sort==='nota-asc')list.sort((a,b)=>a.rating-b.rating);
  else if(sort==='titulo')list.sort((a,b)=>a.title.localeCompare(b.title));
  else if(sort==='autor')list.sort((a,b)=>(a.author||'').localeCompare(b.author||''));
  else if(sort==='ano-desc')list.sort((a,b)=>(b.year||0)-(a.year||0));
  else if(sort==='ano-asc')list.sort((a,b)=>(a.year||0)-(b.year||0));
  else list.reverse();
  return list;
}
function getGenres(){
  let src=currentType==='todos'?items:items.filter(i=>i.type===currentType);
  return['Todos',...new Set(src.map(i=>i.genre))].filter((v,i,a)=>a.indexOf(v)===i);
}
function starsHtml(rating,size=11){
  const full=Math.floor(rating/2);const half=(rating/2-full)>=0.5;let s='';
  for(let i=0;i<5;i++){
    if(i<full)s+=`<span style="font-size:${size}px;color:var(--accent)">★</span>`;
    else if(i===full&&half)s+=`<span style="font-size:${size}px;color:var(--accent)">½</span>`;
    else s+=`<span style="font-size:${size}px;color:var(--border)">★</span>`;
  }
  return s;
}
function renderStats2(list){
  const avg=list.length?(list.reduce((a,i)=>a+i.rating,0)/list.length).toFixed(1):'-';
  const liked=list.filter(i=>i.like==='gostei').length;
  const disliked=list.filter(i=>i.like==='nao-gostei').length;
  const totalPages=list.reduce((a,i)=>a+(parseInt(i.pages)||0),0);
  document.getElementById('stats-bar').innerHTML=`
    <div class="stat-card"><div class="stat-num">${list.length}</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-num">${avg}</div><div class="stat-label">Média</div></div>
    <div class="stat-card"><div class="stat-num">${totalPages>999?(totalPages/1000).toFixed(1)+'k':totalPages}</div><div class="stat-label">Páginas</div></div>
    <div class="stat-card"><div class="stat-num">👍${liked}</div><div class="stat-label">Gostei</div></div>
  `;
}
function renderFilters(){
  const genres=getGenres();
  document.getElementById('filters').innerHTML=genres.map(g=>
    `<button class="filter-chip${currentGenre===g?' active':''}" onclick="setGenre('${g.replace(/'/g,"\\'")}')">${g==='Todos'?'Todos':(GENRES_EMOJI[g]||'')+' '+g}</button>`
  ).join('');
}
function render(){
  const list=getFiltered();
  renderStats2(list);renderFilters();
  if(!list.length){
    const msg=items.length===0
      ?'<div class="empty-icon">📚</div><h3>Nenhum livro ainda</h3><p>Toque no <strong>+</strong> para adicionar sua primeira leitura.</p>'
      :'<div class="empty-icon">🔍</div><h3>Nenhum resultado</h3><p>Tente outro filtro ou busca.</p>';
    document.getElementById('list').innerHTML=`<div class="empty">${msg}</div>`;
    return;
  }
  document.getElementById('list').innerHTML=list.map(item=>{
    const emoji=GENRES_EMOJI[item.genre]||'📓';
    const likeIcon=item.like==='gostei'?'👍':item.like==='nao-gostei'?'👎':'';
    const typeBadge=item.type==='fisico'?'badge-fisico':'badge-digital';
    const typeLabel=item.type==='fisico'?'Físico':'Digital';
    const dateStr=item.date?new Date(item.date).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'}):'';
    const posterHtml=item.poster?`<img src="${item.poster}" alt="" onerror="this.style.display='none';this.parentElement.innerHTML='${emoji}'">`:emoji;
    return `
    <div class="card" onclick="openDetail('${item.id}')">
      <div class="card-header">
        <div class="card-poster">${posterHtml}</div>
        <div class="card-info">
          <div class="card-title">${escHtml(item.title)}</div>
          ${item.author?`<div class="card-author">${escHtml(item.author)}</div>`:''}
          <div class="card-meta">
            <span class="badge ${typeBadge}">${typeLabel}</span>
            <span class="badge badge-genre">${item.genre}</span>
            ${item.year?`<span style="color:var(--muted);font-size:12px">${item.year}</span>`:''}
          </div>
          <div class="stars">${starsHtml(item.rating)}</div>
          <div class="card-bottom">
            <div class="card-score"><span class="score-big">${item.rating}</span><span class="score-small">/10</span></div>
            ${likeIcon?`<span class="card-like">${likeIcon}</span>`:''}
            <span class="card-date">${dateStr}</span>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function setType(t){
  currentType=t;currentGenre='Todos';
  document.querySelectorAll('#tabs .tab').forEach((b,i)=>b.classList.toggle('active',['todos','fisico','digital'][i]===t));
  render();
}
function setGenre(g){currentGenre=g;render();}
function setRankType(t){
  rankType=t;
  document.querySelectorAll('#rank-tabs .tab').forEach((b,i)=>b.classList.toggle('active',['todos','fisico','digital'][i]===t));
  renderRanking();
}
function renderRanking(){
  let list=[...items];
  if(rankType!=='todos')list=list.filter(i=>i.type===rankType);
  list.sort((a,b)=>b.rating-a.rating||a.title.localeCompare(b.title));
  if(!list.length){
    document.getElementById('ranking-list').innerHTML=`<div class="empty"><div class="empty-icon">🏆</div><h3>Sem livros</h3><p>Adicione livros para ver o ranking.</p></div>`;
    return;
  }
  document.getElementById('ranking-list').innerHTML=list.map((item,idx)=>{
    const emoji=GENRES_EMOJI[item.genre]||'📓';
    const numClass=idx===0?'gold':idx===1?'silver':idx===2?'bronze':'';
    const posterHtml=item.poster?`<img src="${item.poster}" alt="" onerror="this.style.display='none';this.parentElement.innerHTML='${emoji}'">`:emoji;
    const medal=idx===0?'🥇':idx===1?'🥈':idx===2?'🥉':'';
    return `
    <div class="rank-card" onclick="openDetail('${item.id}')">
      <div class="rank-num ${numClass}">${medal||('#'+(idx+1))}</div>
      <div class="rank-poster">${posterHtml}</div>
      <div class="rank-info">
        <div class="rank-title">${escHtml(item.title)}</div>
        <div class="rank-sub">${item.author?escHtml(item.author)+' · ':''}${item.genre}</div>
        <div style="margin-top:3px">${starsHtml(item.rating,10)}</div>
      </div>
      <div class="rank-score">${item.rating}</div>
    </div>`;
  }).join('');
}
function renderStats(){
  if(!items.length){
    document.getElementById('stats-page').innerHTML=`<div class="empty" style="padding:40px 0"><div class="empty-icon">📊</div><h3>Sem dados ainda</h3><p>Adicione livros para ver suas estatísticas.</p></div>`;
    return;
  }
  const fisico=items.filter(i=>i.type==='fisico');
  const digital=items.filter(i=>i.type==='digital');
  const avg=n=>n.length?(n.reduce((a,i)=>a+i.rating,0)/n.length).toFixed(1):'-';
  const liked=items.filter(i=>i.like==='gostei').length;
  const disliked=items.filter(i=>i.like==='nao-gostei').length;
  const neutral=items.filter(i=>i.like==='neutro').length;
  const totalPages=items.reduce((a,i)=>a+(parseInt(i.pages)||0),0);
  const avgPages=items.length?Math.round(totalPages/items.length):0;

  const genreCount={};
  items.forEach(i=>genreCount[i.genre]=(genreCount[i.genre]||0)+1);
  const topGenres=Object.entries(genreCount).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxG=topGenres[0]?.[1]||1;

  const authorCount={};
  items.forEach(i=>{if(i.author)authorCount[i.author]=(authorCount[i.author]||0)+1;});
  const topAuthors=Object.entries(authorCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxA=topAuthors[0]?.[1]||1;

  const scoreDist=Array(11).fill(0);
  items.forEach(i=>{const s=Math.round(i.rating);if(s>=0&&s<=10)scoreDist[s]++;});
  const maxS=Math.max(...scoreDist,1);

  const total=liked+disliked+neutral;
  const pct=n=>total?Math.round(n/total*100):0;
  const donutData=[
    {v:liked,color:'var(--green)',label:`👍 Gostei (${pct(liked)}%)`},
    {v:disliked,color:'var(--red)',label:`👎 Não gostei (${pct(disliked)}%)`},
    {v:neutral,color:'var(--muted)',label:`😐 Neutro (${pct(neutral)}%)`},
  ].filter(d=>d.v>0);
  let donutSvg='';
  if(donutData.length){
    const r=40,cx=55,cy=55,circ=2*Math.PI*r;let offset=0;
    const segments=donutData.map(d=>{
      const dash=(d.v/total)*circ;
      const seg=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.color}" stroke-width="16" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"/>`;
      offset+=dash;return seg;
    });
    donutSvg=`<svg width="110" height="110" viewBox="0 0 110 110">${segments.join('')}<text x="55" y="59" text-anchor="middle" fill="var(--text)" font-size="14" font-weight="700">${items.length}</text><text x="55" y="72" text-anchor="middle" fill="var(--muted)" font-size="9">livros</text></svg>`;
  }

  document.getElementById('stats-page').innerHTML=`
    <div class="big-stats">
      <div class="big-stat"><div class="big-stat-num">${items.length}</div><div class="big-stat-label">Total de livros</div></div>
      <div class="big-stat"><div class="big-stat-num">${avg(items)}</div><div class="big-stat-label">Nota média geral</div></div>
      <div class="big-stat"><div class="big-stat-num">${totalPages.toLocaleString('pt-BR')}</div><div class="big-stat-label">Páginas lidas</div></div>
      <div class="big-stat"><div class="big-stat-num">${avgPages}</div><div class="big-stat-label">Média pág./livro</div></div>
      <div class="big-stat"><div class="big-stat-num">${fisico.length}</div><div class="big-stat-label">📖 Físicos</div></div>
      <div class="big-stat"><div class="big-stat-num">${digital.length}</div><div class="big-stat-label">📱 Digitais</div></div>
    </div>
    <div class="stats-section">
      <div class="stats-section-title">Distribuição de notas</div>
      <div class="score-dist">
        ${scoreDist.map((c,i)=>`<div class="score-bar-wrap"><div class="score-bar" style="height:${Math.max(4,Math.round(c/maxS*72))}px;opacity:${c?1:.2}"></div><div class="score-bar-label">${i}</div></div>`).join('')}
      </div>
    </div>
    <div class="stats-section">
      <div class="stats-section-title">Top gêneros</div>
      <div class="bar-chart">
        ${topGenres.map(([g,c])=>`<div class="bar-row"><div class="bar-label">${(GENRES_EMOJI[g]||'')} ${g}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(c/maxG*100)}%"><span class="bar-fill-val">${c}</span></div></div></div>`).join('')}
      </div>
    </div>
    ${topAuthors.length?`
    <div class="stats-section">
      <div class="stats-section-title">Top autores</div>
      <div class="bar-chart">
        ${topAuthors.map(([a,c])=>`<div class="bar-row"><div class="bar-label">${escHtml(a)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(c/maxA*100)}%"><span class="bar-fill-val">${c}</span></div></div></div>`).join('')}
      </div>
    </div>`:''}
    <div class="stats-section">
      <div class="stats-section-title">Opinião geral</div>
      <div class="donut-wrap">
        ${donutSvg}
        <div class="donut-legend">${donutData.map(d=>`<div class="legend-item"><div class="legend-dot" style="background:${d.color}"></div>${d.label}</div>`).join('')}</div>
      </div>
    </div>
  `;
}
function showPage(p){
  ['home','ranking','stats'].forEach(n=>{
    document.getElementById('page-'+n).classList.toggle('active',n===p);
    document.getElementById('nav-'+n).classList.toggle('active',n===p);
  });
  if(p==='ranking')renderRanking();
  if(p==='stats')renderStats();
}

/* Busca de capa via Google Books API (gratuita, sem chave) */
async function searchPoster(){
  const title=document.getElementById('f-title').value.trim();
  const author=document.getElementById('f-author').value.trim();
  if(!title){showToast('Digite o título primeiro');return;}
  document.getElementById('poster-status').textContent='🔍 Buscando capa...';
  document.getElementById('poster-options').innerHTML='';

  // Tenta várias queries, da mais específica à mais simples
  const tentativas=[];
  if(author)tentativas.push(`intitle:${title} inauthor:${author}`);
  tentativas.push(`intitle:${title}`);
  tentativas.push(title);

  let results=[];
  let lastError=null;

  for(const q of tentativas){
    if(results.length)break;
    try{
      const url=`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&maxResults=10`;
      const r=await fetch(url);
      if(!r.ok){lastError='http';continue;}
      const d=await r.json();
      const raw=d.items||[];
      const filtrado=raw.filter(x=>x.volumeInfo?.imageLinks?.thumbnail||x.volumeInfo?.imageLinks?.smallThumbnail);
      if(filtrado.length)results=filtrado.slice(0,6);
    }catch(e){lastError=e;continue;}
  }

  if(!results.length){
    document.getElementById('poster-status').textContent='❌ Capa não encontrada. Tente o título em inglês ou mais simples.';
    return;
  }

  const getImg=x=>{
    const links=x.volumeInfo.imageLinks||{};
    const raw=links.thumbnail||links.smallThumbnail||'';
    return raw.replace('http:','https:').replace('zoom=1','zoom=2');
  };

  document.getElementById('poster-status').textContent=`✅ ${results.length} capa(s) encontrada(s) — escolha uma:`;
  document.getElementById('poster-options').innerHTML=results.map((x,i)=>{
    const img=getImg(x);
    return `<div class="poster-opt${i===0?' selected':''}" onclick="selectPoster('${img}',this)"><img src="${img}" alt="" loading="lazy"></div>`;
  }).join('');

  const first=results[0];
  selectPosterUrl(getImg(first));
  const yr=(first.volumeInfo.publishedDate||'').slice(0,4);
  if(yr&&!document.getElementById('f-year').value)document.getElementById('f-year').value=yr;
  if(first.volumeInfo.pageCount&&!document.getElementById('f-pages').value)document.getElementById('f-pages').value=first.volumeInfo.pageCount;
  if(first.volumeInfo.authors&&!document.getElementById('f-author').value)document.getElementById('f-author').value=first.volumeInfo.authors[0];
}
function selectPoster(url,el){
  document.querySelectorAll('.poster-opt').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');selectPosterUrl(url);
}
function selectPosterUrl(url){
  selectedPosterUrl=url;
  const prev=document.getElementById('poster-preview');
  if(url)prev.innerHTML=`<img src="${url}" alt="" onerror="this.parentElement.innerHTML='📖'">`;
}
function onTitleInput(){
  selectedPosterUrl='';
  document.getElementById('poster-preview').innerHTML=`<span id="poster-emoji">${formType==='fisico'?'📖':'📱'}</span>`;
}

function openAddModal(){
  editingId=null;formType='fisico';formLike='neutro';selectedPosterUrl='';
  document.getElementById('modal-title').textContent='Novo livro';
  document.getElementById('f-title').value='';
  document.getElementById('f-author').value='';
  document.getElementById('f-genre').value='Ficção';
  document.getElementById('f-year').value='';
  document.getElementById('f-pages').value='';
  document.getElementById('f-rating').value=7;
  document.getElementById('f-rating-val').textContent='7';
  document.getElementById('f-notes').value='';
  document.getElementById('delete-btn').style.display='none';
  document.getElementById('poster-preview').innerHTML='<span id="poster-emoji">📖</span>';
  document.getElementById('poster-options').innerHTML='';
  document.getElementById('poster-status').textContent='';
  selectType2('fisico');selectLike('neutro');
  openModal('add-modal');
}
function openEdit(id){
  closeModal('detail-modal');
  const item=items.find(i=>i.id===id);
  if(!item)return;
  editingId=id;selectedPosterUrl=item.poster||'';
  document.getElementById('modal-title').textContent='Editar livro';
  document.getElementById('f-title').value=item.title;
  document.getElementById('f-author').value=item.author||'';
  document.getElementById('f-genre').value=item.genre;
  document.getElementById('f-year').value=item.year||'';
  document.getElementById('f-pages').value=item.pages||'';
  document.getElementById('f-rating').value=item.rating;
  document.getElementById('f-rating-val').textContent=item.rating;
  document.getElementById('f-notes').value=item.notes||'';
  document.getElementById('delete-btn').style.display='block';
  document.getElementById('poster-options').innerHTML='';
  document.getElementById('poster-status').textContent='';
  const prev=document.getElementById('poster-preview');
  if(item.poster)prev.innerHTML=`<img src="${item.poster}" alt="" onerror="this.innerHTML='📖'">`;
  else prev.innerHTML=`<span>${GENRES_EMOJI[item.genre]||'📓'}</span>`;
  selectType2(item.type);selectLike(item.like);
  openModal('add-modal');
}
function selectType2(t){
  formType=t;
  document.getElementById('btn-fisico').classList.toggle('active',t==='fisico');
  document.getElementById('btn-digital').classList.toggle('active',t==='digital');
}
function selectType(t){selectType2(t);}
function selectLike(v){
  formLike=v;
  document.getElementById('btn-like').classList.toggle('active-yes',v==='gostei');
  document.getElementById('btn-dislike').classList.toggle('active-no',v==='nao-gostei');
  document.getElementById('btn-neutral').classList.toggle('active-yes',v==='neutro');
}
function saveItem(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){document.getElementById('f-title').focus();return;}
  const item={
    id:editingId||Date.now().toString(36)+Math.random().toString(36).slice(2),
    type:formType,title,
    author:document.getElementById('f-author').value.trim(),
    genre:document.getElementById('f-genre').value,
    year:document.getElementById('f-year').value,
    pages:document.getElementById('f-pages').value,
    rating:parseFloat(document.getElementById('f-rating').value),
    like:formLike,
    notes:document.getElementById('f-notes').value.trim(),
    poster:selectedPosterUrl||'',
    date:editingId?(items.find(i=>i.id===editingId)?.date||new Date().toISOString()):new Date().toISOString(),
    updated:new Date().toISOString()
  };
  if(editingId){const idx=items.findIndex(i=>i.id===editingId);if(idx>-1)items[idx]=item;}
  else items.push(item);
  save();updateSubtitle();updateYearSelect();render();renderRanking();renderStats();
  closeModal('add-modal');showToast('✅ Salvo!');
}
function deleteItem(){
  if(!editingId)return;
  if(!confirm('Excluir este livro?'))return;
  items=items.filter(i=>i.id!==editingId);
  save();updateSubtitle();updateYearSelect();render();renderRanking();renderStats();
  closeModal('add-modal');
}
function openDetail(id){
  const item=items.find(i=>i.id===id);
  if(!item)return;
  const emoji=GENRES_EMOJI[item.genre]||'📓';
  const likeIcon=item.like==='gostei'?'👍 Gostei':item.like==='nao-gostei'?'👎 Não gostei':'😐 Neutro';
  const likeColor=item.like==='gostei'?'var(--green)':item.like==='nao-gostei'?'var(--red)':'var(--muted)';
  const dateStr=item.date?new Date(item.date).toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'}):'';
  const posterHtml=item.poster?`<img src="${item.poster}" alt="" onerror="this.style.display='none';this.parentElement.innerHTML='${emoji}'">`:emoji;
  document.getElementById('detail-content').innerHTML=`
    <div class="modal-handle"></div>
    <div style="text-align:center;margin-bottom:16px">
      <div class="detail-poster">${posterHtml}</div>
      <div class="detail-title">${escHtml(item.title)}</div>
      ${item.author?`<div class="detail-author">${escHtml(item.author)}</div>`:''}
      <div class="detail-badges">
        <span class="badge ${item.type==='fisico'?'badge-fisico':'badge-digital'}">${item.type==='fisico'?'Físico':'Digital'}</span>
        <span class="badge badge-genre">${item.genre}</span>
        ${item.year?`<span class="badge badge-genre">${item.year}</span>`:''}
        ${item.pages?`<span class="badge badge-genre">${item.pages}p</span>`:''}
      </div>
    </div>
    <div class="detail-score">${item.rating}</div>
    <div class="detail-score-label">de 10 pontos</div>
    <div class="detail-stars">${starsHtml(item.rating,20)}</div>
    <div class="detail-opinion" style="color:${likeColor}">${likeIcon}</div>
    ${item.notes?`<div class="detail-notes">"${escHtml(item.notes)}"</div>`:''}
    ${dateStr?`<div style="text-align:center;font-size:12px;color:var(--muted);margin-bottom:16px">Adicionado em ${dateStr}</div>`:''}
    <div class="detail-actions">
      <button class="edit-btn" onclick="openEdit('${item.id}')">✏️ Editar</button>
      <button class="edit-btn" onclick="closeModal('detail-modal')">Fechar</button>
    </div>`;
  openModal('detail-modal');
}
function openModal(id){document.getElementById(id).classList.add('open');document.body.style.overflow='hidden';}
function closeModal(id){document.getElementById(id).classList.remove('open');document.body.style.overflow='';}
document.querySelectorAll('.modal-overlay').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el)closeModal(el.id);});
});
function showToast(msg,dur=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(t._t);
  t._t=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(20px)';},dur);
}
function exportData(){
  if(!items.length){showToast('Nenhum dado para exportar');return;}
  const blob=new Blob([JSON.stringify({version:1,exported:new Date().toISOString(),items},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`livrolog-backup-${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  showToast('✅ Backup exportado!');closeModal('menu-modal');
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.items||!Array.isArray(data.items))throw 0;
      if(!confirm(`Importar ${data.items.length} livro(s)? Serão adicionados aos existentes.`)){e.target.value='';return;}
      const ids=new Set(items.map(i=>i.id));
      const novo=data.items.filter(i=>!ids.has(i.id));
      items=[...items,...novo];
      save();updateSubtitle();updateYearSelect();render();renderRanking();renderStats();
      showToast(`✅ ${novo.length} livro(s) importado(s)!`);closeModal('menu-modal');
    }catch{showToast('❌ Arquivo inválido');}
    e.target.value='';
  };
  reader.readAsText(file);
}
function clearAllData(){
  if(!items.length){showToast('Nenhum dado para apagar');return;}
  if(!confirm(`Apagar TODOS os ${items.length} livro(s)?\nEsta ação não pode ser desfeita!`))return;
  items=[];save();updateSubtitle();updateYearSelect();render();renderRanking();renderStats();
  showToast('🗑️ Dados apagados');closeModal('menu-modal');
}
function openMenuModal(){
  const f=items.filter(i=>i.type==='fisico').length;
  const d=items.filter(i=>i.type==='digital').length;
  const avg=items.length?(items.reduce((a,i)=>a+i.rating,0)/items.length).toFixed(1):'-';
  document.getElementById('menu-stats').innerHTML=`
    📖 ${f} físico${f!==1?'s':''}<br>
    📱 ${d} digital${d!==1?'is':''}<br>
    ⭐ Nota média: ${avg}<br>
    👍 ${items.filter(i=>i.like==='gostei').length} curtido${items.filter(i=>i.like==='gostei').length!==1?'s':''}
  `;
  openModal('menu-modal');
}
function updateOnline(){
  const b=document.getElementById('sync-banner'),t=document.getElementById('sync-text');
  if(!navigator.onLine){b.classList.add('show');t.textContent='Offline — dados salvos localmente';}
  else b.classList.remove('show');
}
window.addEventListener('online',updateOnline);
window.addEventListener('offline',updateOnline);
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
load();
</script>
